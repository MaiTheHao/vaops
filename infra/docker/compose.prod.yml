name: vaops-dev
services:
  postgres:
    image: postgres:17-alpine
    container_name: vaops-db-dev
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - TZ=UTC
    ports:
      - '${DB_PORT}:5432'
    networks:
      - vaops-network
    volumes:
      - vaops_pg_data:/var/lib/postgresql/data
      - ./scripts:/docker-entrypoint-initdb.d

    command: >
      postgres 
      -c 'shared_buffers=1GB' 
      -c 'work_mem=32MB'
      -c 'maintenance_work_mem=256MB'
      -c 'effective_cache_size=4GB'
      -c 'max_connections=100'
      -c 'fsync=off' 
      -c 'full_page_writes=off'

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${DB_NAME}']
      interval: 5s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway:10
    container_name: vaops-flyway
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vaops-network
    volumes:
      - ../database/migrations:/flyway/sql
    environment:
      - FLYWAY_URL=jdbc:postgresql://postgres:5432/${DB_NAME}?currentSchema=public
      - FLYWAY_USER=${POSTGRES_USER}
      - FLYWAY_PASSWORD=${POSTGRES_PASSWORD}
      - FLYWAY_LOCATIONS=filesystem:/flyway/sql
      - FLYWAY_BASELINE_ON_MIGRATE=true
      - FLYWAY_CONNECT_RETRIES=10
    command: migrate
    restart: 'no'

  backend:
    image: c4fdocker/vaops-backend:latest
    container_name: vaops-backend
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - vaops-network
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully

volumes:
  vaops_pg_data:
    name: vaops_database_volume

networks:
  vaops-network:
    driver: bridge
