name: VAOPS Spring Boot Backend

on:
  push:
    branches: ['master']
    paths:
      - 'backend/**'
  pull_request:
    branches: ['master']
    paths:
      - 'backend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend
    env:
      HAS_DOCKER_CREDENTIALS: ${{ format('{0}', secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Grant execute permission for mvnw
        run: chmod +x ./mvnw

      - name: Run tests
        run: ./mvnw test

      - name: Build jar file
        run: ./mvnw clean package -DskipTests

      - name: Login to Docker Hub
        if: ${{ fromJSON(env.HAS_DOCKER_CREDENTIALS) }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Image
        if: ${{ fromJSON(env.HAS_DOCKER_CREDENTIALS) }}
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/vaops-backend:${{ github.sha }}
