spring:
  datasource:
    url: jdbc:postgresql://${vaops.databases.primary.host:127.0.0.1}:${vaops.databases.primary.port:5432}/${vaops.databases.primary.name:vaops}?currentSchema=public
    username: ${vaops.databases.primary.username:postgres}
    password: ${vaops.databases.primary.password:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20} # Maximum number of connections in the pool
      minimum-idle: ${DB_POOL_MIN:5} # Minimum number of idle connections to maintain
      connection-timeout: 30000 # Maximum time (ms) to wait for a connection from the pool
      idle-timeout: 600000 # Maximum time (ms) a connection is allowed to sit idle in the pool (10 minutes)
      max-lifetime: 1800000 # Maximum lifetime (ms) of a connection in the pool (30 minutes)
      pool-name: VaopsPrimaryHikariPool # Name of the connection pool for logs and monitoring
  jpa:
    hibernate:
      ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          format_sql: true

server:
  port: ${vaops.server.port:8000}

vaops:
  databases:
    primary:
      host: 127.0.0.1
      port: 5432
      name: vaops
      username: postgres
      password: postgres
  server:
    port: 8000
  security:
    token:
      access:
        secret: ${JWT_ACCESS_SECRET:your-jwt-access-token-secret-key-at-least-256-bits-long-for-hs256-signature-algorithm}
        expiration: ${JWT_ACCESS_EXPIRATION:3600000} # 1 hour (in ms)
      refresh:
        secret: ${JWT_REFRESH_SECRET:your-jwt-refresh-token-secret-key-at-least-256-bits-long-for-hs256-signature-algorithm}
        expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7 days (in ms)
